<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | StudioPass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div class="page-shell auth-page-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Premium publishing stack</p>
        <h1>StudioPass</h1>
      </div>
      <nav class="topnav">
        <a href="index.html">Discover</a>
        <a href="register.html">Register</a>
        <a href="login.html">Login</a>
        <a href="profile.html">Profile</a>
      </nav>
      <div class="session-actions">
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">Dark</button>
        <span id="sessionBadge" class="session-badge">Guest</span>
        <button id="logoutBtn" class="ghost-btn hidden" type="button">Logout</button>
      </div>
    </header>

    <main class="auth-layout">
      <section class="auth-card">
        <p class="eyebrow">Create your access</p>
        <h2 class="auth-title">Join as a subscriber or creator</h2>
        <p id="authHint" class="muted-copy">Use a creator account if you want publishing and report access.</p>
        <form id="registerForm" class="stack-form">
          <label>
            <span>Name</span>
            <input id="registerName" type="text" placeholder="Avery Cole" required>
          </label>
          <label>
            <span>Email</span>
            <input id="registerEmail" type="email" placeholder="you@example.com" required>
          </label>
          <label>
            <span>Password</span>
            <input id="registerPassword" type="password" placeholder="Minimum 6 characters" required>
          </label>
          <label>
            <span>Role</span>
            <select id="registerRole">
              <option value="subscriber">Subscriber</option>
              <option value="creator">Creator</option>
            </select>
          </label>
          <button class="primary-btn" type="submit">Create Account</button>
        </form>
        <div class="auth-links">
          <span class="muted-copy">Already have an account?</span>
          <a href="login.html">Log in</a>
        </div>
      </section>
    </main>
  </div>
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
  <script src="platform.js"></script>
</body>
</html>
